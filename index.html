<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Capteurs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    /* Styles CSS pour les cartes de capteurs */
    body {
      font-family: Arial, sans-serif;
    }

    .sensor-card {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .sensor-card h2 {
      margin: 0;
      display: flex;
      align-items: center;
    }
    .sensor-card h2 button {
      border-radius: 60px;
      border-color: #2196F3;
      display: flex;
      margin-left: 60px;
      background-color: #2196F3;
      
    }
    .sensor-card h2 button a {
      color: white;
      text-decoration: none;
      padding: 10px;
      display: flex;
      align-items: center;
    }

    .sensor-card h2 i {
      margin-right: 10px;
      font-size: 32px;
    }

    .sensor-card p {
      margin: 0;
      font-size: 28px;
      margin-left: 20px;
    }

    .temperature-icon {
      color: #FF5722;
    }

    .oxygen-level-icon {
      color: #4CAF50;
    }

    .blood-pressure-icon {
      color: #2196F3;
    }

    .activity-icon {
      color: #FFC107;
    }

    .heart-rate-icon {
      color: #E91E63;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      grid-gap: 20px;
    }
    h1 i {
      color : red;
    }
    h1 {
      text-align: center;
    
      font-size: 32px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1><i class="fas fa-home"></i> Santé <span>à</span> domicile</h1>

  <div class="container">
    <div class="sensor-card" id="temperature-card">
      <h2><i class="fas fa-thermometer temperature-icon"></i> Température</h2>
      <p id="temperature-value">-</p>
    </div>

    <div class="sensor-card" id="oxygen-level-card">
      <h2><i class="fas fa-lungs oxygen-level-icon"></i> Niveau d'oxygène</h2>
      <p id="oxygen-level-value">-</p>
    </div>

    <div class="sensor-card" id="blood-pressure-card">
      <h2><i class="fas fa-heartbeat blood-pressure-icon"></i> Pression artérielle</h2>
      <p id="blood-pressure-value">-</p>
    </div>

    <div class="sensor-card" id="activity-card">
      <h2><i class="fas fa-walking activity-icon"></i> Activité</h2>
      <p id="activity-value">-</p>
    </div>

    <div class="sensor-card" id="heart-rate-card">
      <h2><i class="fas fa-heart heart-rate-icon"></i> Rythme cardiaque</h2>
      <p id="heart-rate-value">-</p>
    </div>

    <div class="sensor-card" id="soins-card">
      <h2>
        <button><a href="https://www.youtube.com/watch?v=D8LYb9JFeqw">Soins</a></button>
        <button><a href="c:\Users\Meder\OneDrive\Bureau\sante\data\appel.html">Appeler</a></button>
      </h2>
    </div>
  </div>

  <script>
    // Fonction pour mettre à jour les valeurs des cartes de capteurs
    function updatesensorCard(cardId, value) {
      const cardElement = document.getElementById(cardId);
      const valueElement = cardElement.querySelector('p');
      valueElement.textContent = value;
    }

    // Fonction pour traiter les données des capteurs reçues via une requête POST
    function processSensorData(data) {
      updateSensorCard('temperature-card', data.temperature + ' °C');
      updateSensorCard('oxygen-level-card', data.oxygenLevel + '%');
      updateSensorCard('blood-pressure-card', data.pressure + ' mmHg');
      updateSensorCard('activity-card', 'Marche');
      updateSensorCard('heart-rate-card', 'Normal');
    }

    // Boucle principale pour effectuer une requête POST périodique et recevoir les données des capteurs
    setInterval(function() {
      fetch('https://medard-mak.github.io/sante/update.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          temperature: 25.5,
          oxygenLevel: 98,
          pressure: '120/80'
        })
      })
      .then(response => response.json())
      .then(data => {
        processSensorData(data);
      });
    }, 5000);
  </script>
</body>
</html>
