<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Santé à domicile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    /* Styles CSS */
  </style>
  <script>
    // Code JavaScript
    function updateSensorCard(card, value) {
      var valueElement = card.querySelector('.sensor-value');
      valueElement.innerText = value;
    }

    document.addEventListener('DOMContentLoaded', function() {
      var temperatureCard = document.createElement('div');
      temperatureCard.classList.add('sensor-card');
      addSensorCard('fa-thermometer-half', 'Température', '', 'temperature');
      document.getElementById('data').appendChild(temperatureCard);

      // Créez les autres cartes de capteur ici
      // var oxygenLevelCard = ...
      // var bloodPressureCard = ...
      // var activityCard = ...
      // var heartRateCard = ...

      setInterval(function() {
        fetch('/')
          .then(response => response.text())
          .then(data => {
            var parsedData = JSON.parse(data);

            updateSensorCard(temperatureCard, parsedData.temperature);
            // Mettez à jour les autres cartes de capteur ici
            // updateSensorCard(oxygenLevelCard, parsedData.oxygenLevel);
            // updateSensorCard(bloodPressureCard, parsedData.bloodPressure);
            // updateSensorCard(activityCard, parsedData.activity);
            // updateSensorCard(heartRateCard, parsedData.heartRate);
          });
      }, 5000);
    });

    function addSensorCard(iconClass, label, value, colorClass) {
      var card = document.createElement('div');
      card.classList.add('sensor-card');

      var icon = document.createElement('i');
      icon.classList.add('fas', iconClass, colorClass);
      card.appendChild(icon);

      var labelElement = document.createElement('p');
      labelElement.innerText = label;
      card.appendChild(labelElement);

      var valueElement = document.createElement('p');
      valueElement.classList.add('sensor-value'); // Ajoutez une classe pour cibler cet élément plus tard
      valueElement.innerText = value;
      card.appendChild(valueElement);

      document.getElementById('data').appendChild(card);
    }
  </script>
</head>
<body>
  <h1><i class="fas fa-medkit medical-icon"></i><span>Santé</span>  à domicile</h1>
  <div id="data" class="sensor-card"></div>
</body>
</html>
